# ==========================================================================
# CRE WORKFLOW SETTINGS FILE — SENATE
# ==========================================================================
# Workflow-specific settings for CRE CLI targets.
# Settings here override CRE Project Settings File values.

# ==========================================================================
# DEFAULT: Tenderly Virtual TestNet — uses VTN-deployed contract addresses
vtn-simulation:
  user-workflow:
    workflow-name: "senate-workflow-vtn"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "../config.vtn.json"
    secrets-path: "../secrets.yaml"

